services:
  - type: web
      name: wisp-admin-cloud
          runtime: node
              buildCommand: npm install
                  startCommand: node server.js
                      envVars:
                            - key: NODE_ENV
                                    value: production
                                          - key: MIKROTIK_IP
                                                  sync: false
                                                        - key: MIKROTIK_USER
                                                                sync: false
                                                                      - key: MIKROTIK_PASS
                                                                              sync: false
                                                                                    - key: ADMIN_USER
                                                                                            sync: false
                                                                                                  - key: ADMIN_PASS
                                                                                                          sync: false
                                                                                                                - key: SESSION_SECRET
                                                                                                                        generateValue: true
